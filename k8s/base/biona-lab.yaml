apiVersion: apps/v1
kind: Deployment
metadata:
  name: biona-lab
  labels:
    app: biona-lab
    component: lab
    part-of: biona
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biona-lab
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: biona-lab
        component: lab
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: biona-lab
          image: biona-lab:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: biona-secrets
                  key: aes-key
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: biona-secrets
                  key: mlflow-uri
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: biona-model-pvc
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: biona-lab
  labels:
    app: biona-lab
spec:
  selector:
    app: biona-lab
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: biona-model-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
