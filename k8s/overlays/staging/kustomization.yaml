apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: biona-staging

bases:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: biona-lab
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: biona-lab
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "100m"
                  limits:
                    memory: "1Gi"
                    cpu: "500m"

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: biona-nora-health
      spec:
        replicas: 1

images:
  - name: biona-lab
    newName: ghcr.io/biona-ai/biona-lab
  - name: biona-nora-health
    newName: ghcr.io/biona-ai/biona-nora-health
